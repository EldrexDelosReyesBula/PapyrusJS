<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papyr.js 100% Declarative Developer Studio</title>
    <!-- Load Three.js from CDN for WebGL cinematic graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Import local Compiled Complete Showcase Bundle -->
    <script src="../papyr-complete.js"></script>
    <style>
        /* Premium Global HSL Styling */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --bg-dark: #070913;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-blur: blur(12px);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Glassmorphic Container Styles */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.05);
        }

        /* Responsive Custom Grid Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 10;
        }

        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .header-section h1 {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.15rem;
            margin: 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 380px 1fr;
            }
        }

        /* Controllers */
        .control-group {
            margin-bottom: 24px;
        }

        .control-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .custom-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
            transition: transform 0.1s ease;
        }

        .custom-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .studio-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: all 0.2s ease;
        }

        .studio-btn:hover {
            background: #4f46e5;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .studio-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px 14px;
            color: white;
            font-family: inherit;
            outline: none;
            width: calc(100% - 30px);
            transition: border-color 0.2s ease;
        }

        .studio-input:focus {
            border-color: var(--primary);
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .badge {
            background: var(--primary-glow);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
        }

        .snippet-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #cbd5e1;
            overflow-x: auto;
            white-space: pre;
            margin-top: 16px;
        }

        /* --- Creative Todo Item Styles --- */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .todo-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }

        .todo-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        /* Modern Custom Checkbox */
        .todo-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .todo-checkbox:hover {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .todo-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .todo-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Animated Strikethrough Text */
        .todo-title {
            font-size: 0.9rem;
            color: var(--text-light);
            transition: color 0.3s ease;
            position: relative;
        }

        .todo-title.done {
            color: var(--text-muted);
        }

        .todo-title::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 1.5px;
            background: var(--primary);
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-50%);
        }

        .todo-title.done::after {
            width: 100%;
        }

        /* --- Legacy Code Renovations --- */
        .legacy-box {
            background: rgba(239, 68, 68, 0.02);
            border: 1px solid rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        .legacy-box:hover {
            border-color: rgba(239, 68, 68, 0.25);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.05);
        }
        .legacy-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fca5a5;
            font-family: inherit;
            outline: none;
            width: calc(100% - 30px);
            transition: border-color 0.2s ease;
            margin-bottom: 8px;
        }
        .legacy-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
        }
        .legacy-badge {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <!-- 1. Background Cinematic Starfield Container -->
    <div id="starfield-bg" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none;"></div>

    <!-- 2. Main Entry Point for entire 100% Papyr UI -->
    <div id="app"></div>

    <script>
        // Guard scope until DOM is ready
        papyr.ready(() => {
            console.log("🚀 Bootstrapping 100% Papyr Declarative Studio App...");

            // 1. Initialise background space starfield
            const starfieldContainer = document.getElementById('starfield-bg');
            const bgScene = papyr['3d'].scene({
                environment: 'space',
                particles: true,
                depth: true
            });
            starfieldContainer.appendChild(bgScene);

            // ==========================================
            // 2. STATE NODE DEFINITIONS (Reactivity)
            // ==========================================
            const chartDataVal = papyr.state(45);
            const waveFrequencyVal = papyr.state(2);
            const wattConsent = papyr.state(false);
            const todoInputVal = papyr.state("");

            // 3D Customization States
            const cubeSizeVal = papyr.state(1.2);
            const sphereRadiusVal = papyr.state(1.0);
            const torusSpinVal = papyr.state(0.02);
            const torusColorVal = papyr.state("#a855f7");
            const gravityActiveVal = papyr.state(false);

            // Window size tracker for responsive layout computations
            const windowWidthVal = papyr.state(typeof window !== 'undefined' ? window.innerWidth : 1200);
            if (typeof window !== 'undefined') {
                window.addEventListener('resize', () => {
                    windowWidthVal.value = window.innerWidth;
                });
            }

            // Legacy Renovation State
            const legacyInputVal = papyr.state("Vanilla JS legacy value");

            // 0. Initialize PWA offline support
            if (papyr.pwa && typeof papyr.pwa.init === 'function') {
                papyr.pwa.init({
                    swPath: '../sw.js',
                    assets: [
                        '../',
                        '../index.html',
                        '../papyr-complete.js'
                    ]
                }).catch(err => console.warn("PWA Init error:", err));
            }

            // ==========================================
            // 3. PERSISTENT LOCAL CRUD DATABASE CONFIG
            // ==========================================
            const todoStore = papyr.crud('playground_todos');
            // Auto-synchronize using computed reactivity
            const todosList = papyr.computed(() => todoStore.query());

            // CRUD Creation
            const handleAddTodo = () => {
                const val = todoInputVal.value.trim();
                if (!val) return;
                todoStore.create({ title: val, done: false });
                todoInputVal.value = "";
            };

            // CRUD Updation
            const handleToggleTodo = (id) => {
                const item = todoStore.read(id);
                if (item) {
                    todoStore.update(id, { done: !item.done });
                }
            };

            // CRUD Deletion
            const handleDeleteTodo = (id) => {
                todoStore.delete(id);
            };

            // ==========================================
            // 4. ML PERCEPTRON CONFIG
            // ==========================================
            const trainingPoints = [];
            const perceptron = papyr.ml.perceptron({ inputs: 2, lr: 0.1 });
            const perceptronWeights = papyr.state("[0, 0]");
            const perceptronBias = papyr.state("0");
            const perceptronCount = papyr.state(0);

            // ==========================================
            // 5. ASSEMBLE ENTIRE APP TREE ENTIRELY WITH PAPYRUS
            // ==========================================
            const App = papyr.div('.container',
                
                // Header Section
                papyr.header('.header-section',
                    papyr.span('.badge', "🚀 100% PAPYRUS RENDERED"),
                    papyr.h1("Live Developer Studio"),
                    papyr.p("Fully isomorphic single-page dashboard designed, styled, and rendered strictly using Papyr tag creators.")
                ),

                // Responsive Dashboard Grid utilizing Papyr's layout grid builder reactively
                papyr.layout.grid({ 
                    cols: papyr.computed(() => windowWidthVal.value < 1024 ? '1fr' : '380px 1fr'), 
                    gap: '32px' 
                },
                    
                    // Left Column: Control Panel & CRUD Todo list
                    papyr.aside('.glass-panel', { style: { height: 'fit-content', display: 'flex', flexDirection: 'column', gap: '24px' } },
                        
                        papyr.div(
                            papyr.h2({ style: { margin: '0 0 4px 0' } }, "Control Center"),
                            papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.9rem', margin: '0' } }, "Mutate reactive values and check local stores.")
                        ),

                        // State Slider 1 (Chart Data)
                        papyr.div('.control-group',
                            papyr.label('.control-label', "Live State Pacing (Chart Data)"),
                            papyr.div({ style: { display: 'flex', gap: '12px', alignItems: 'center', marginTop: '8px' } },
                                papyr.input('range', {
                                    class: 'custom-slider',
                                    min: '10',
                                    max: '95',
                                    ...papyr.model(chartDataVal)
                                }),
                                papyr.span({ style: { fontWeight: 'bold', color: 'var(--primary)', minWidth: '32px', textAlign: 'right' } },
                                    () => chartDataVal.value
                                )
                            )
                        ),

                        // State Slider 2 (Sine wave freq)
                        papyr.div('.control-group',
                            papyr.label('.control-label', "STEM Sine Wave Frequency"),
                            papyr.div({ style: { display: 'flex', gap: '12px', alignItems: 'center', marginTop: '8px' } },
                                papyr.input('range', {
                                    class: 'custom-slider',
                                    min: '1',
                                    max: '10',
                                    ...papyr.model(waveFrequencyVal)
                                }),
                                papyr.span({ style: { fontWeight: 'bold', color: '#10b981', minWidth: '32px', textAlign: 'right' } },
                                    () => waveFrequencyVal.value
                                )
                            )
                        ),

                        // GDPR Consent (WATT Engine)
                        papyr.div('.control-group',
                            papyr.span('.badge', { style: { background: 'rgba(16,185,129,0.1)', borderColor: 'rgba(16,185,129,0.3)', color: '#34d399' } }, "Privacy Secure"),
                            papyr.label('.control-label', { style: { marginTop: '8px' } }, "GDPR Storage Consent"),
                            papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.8rem', marginTop: '4px', marginBottom: '12px' } }, 
                                "WATT sandboxes analytical localStorage keys when disabled."
                            ),
                            papyr.div({ style: { display: 'flex', gap: '12px' } },
                                papyr.button('.studio-btn', {
                                    style: { background: '#10b981', padding: '8px 14px', fontSize: '0.85rem' },
                                    onclick: () => {
                                        papyr.security.setConsent(true);
                                        localStorage.setItem('_ga', 'GA1.2.987216');
                                        wattConsent.value = true;
                                    }
                                }, "Grant"),
                                papyr.button('.studio-btn', {
                                    style: { background: '#f43f5e', padding: '8px 14px', fontSize: '0.85rem' },
                                    onclick: () => {
                                        papyr.security.setConsent(false);
                                        localStorage.setItem('_ga', 'blocked');
                                        wattConsent.value = false;
                                    }
                                }, "Deny")
                            ),
                            papyr.div({
                                style: { marginTop: '12px', fontSize: '0.85rem', fontWeight: 'bold' }
                            }, () => {
                                return wattConsent.value 
                                    ? papyr.span({ style: { color: '#10b981' } }, "Status: Granted (Writing to physical storage)")
                                    : papyr.span({ style: { color: '#f43f5e' } }, "Status: Blocked (Memory-Only Sandbox)");
                            }),
                            // WATT Geolocation and Camera/Mic test buttons
                            papyr.div({ style: { marginTop: '16px', display: 'flex', flexDirection: 'column', gap: '8px' } },
                                papyr.label('.control-label', { style: { fontSize: '0.75rem', color: 'var(--text-muted)' } }, "Test Interceptions"),
                                papyr.div({ style: { display: 'flex', gap: '8px' } },
                                    papyr.button('.studio-btn', {
                                        style: { background: 'rgba(99, 102, 241, 0.1)', border: '1px solid rgba(99,102,241,0.2)', color: '#a5b4fc', padding: '6px 10px', fontSize: '0.75rem', flex: 1 },
                                        onclick: () => {
                                            if (navigator.geolocation) {
                                                navigator.geolocation.getCurrentPosition(
                                                    (pos) => alert(`Permission allowed! Lat: ${pos.coords.latitude}, Lng: ${pos.coords.longitude}`),
                                                    (err) => alert(`Denied/Error: ${err.message}`)
                                                );
                                            } else {
                                                alert("Geolocation is not supported by this browser.");
                                            }
                                        }
                                    }, "📍 Geolocation"),
                                    papyr.button('.studio-btn', {
                                        style: { background: 'rgba(99, 102, 241, 0.1)', border: '1px solid rgba(99,102,241,0.2)', color: '#a5b4fc', padding: '6px 10px', fontSize: '0.75rem', flex: 1 },
                                        onclick: () => {
                                            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                                                navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                                                    .then(() => alert("Permission allowed! Got stream."))
                                                    .catch((err) => alert(`Denied/Error: ${err.message}`));
                                            } else {
                                                alert("Media devices getUserMedia is not supported by this browser.");
                                            }
                                        }
                                    }, "📹 Camera/Mic")
                                )
                            )
                        ),

                        papyr.hr({ style: { border: 'none', borderTop: '1px solid rgba(255,255,255,0.06)', margin: '4px 0' } }),

                        // Persistent CRUD Task Manager
                        papyr.div('.control-group',
                            papyr.span('.badge', { style: { background: 'rgba(99,102,241,0.1)', borderColor: 'rgba(99,102,241,0.3)', color: '#a5b4fc' } }, "CRUD Store"),
                            papyr.label('.control-label', { style: { marginTop: '8px' } }, "Persistent Local Tasks"),
                            
                            // Input fields
                            papyr.div({ style: { display: 'flex', gap: '8px', marginTop: '8px', marginBottom: '16px' } },
                                papyr.input('text', {
                                    class: 'studio-input',
                                    placeholder: 'Add new persistent task...',
                                    onMounted: (el) => {
                                        console.log("🔌 [CRUD Input] Mounted. Setting up two-way binding...");
                                        papyr.bind(el, todoInputVal);
                                    }
                                }),
                                papyr.button('.studio-btn', {
                                    style: { padding: '10px 14px' },
                                    onclick: handleAddTodo
                                }, "+")
                            ),

                            // Reactive Tasks List using fine-grained Papyr.js primitives
                            papyr.div({ style: { display: 'flex', flexDirection: 'column', gap: '10px', maxHeight: '200px', overflowY: 'auto' } },
                                papyr.if(
                                    papyr.computed(() => todosList.value.length === 0),
                                    () => papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.85rem', textAlign: 'center', margin: '8px 0' } }, "No tasks in persistent CRUD store."),
                                    () => papyr.for(todosList, (todo) => {
                                        return papyr.div('.todo-item',
                                            papyr.div('.todo-content',
                                                papyr.div(`.todo-checkbox${todo.done ? '.checked' : ''}`, {
                            
                            // Task List items
                            papyr.div({ style: { display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '160px', overflowY: 'auto' } },
                                () => todosList.value.map(item => 
                                    papyr.div({ style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.05)', borderRadius: '8px' } },
                                        papyr.div({ style: { display: 'flex', alignItems: 'center', gap: '8px' } },
                                            papyr.input('checkbox', {
                                                checked: item.done,
                                                onclick: () => handleToggleTodo(item.id)
                                            }),
                                            papyr.span(item.title, { style: { textDecoration: item.done ? 'line-through' : 'none', color: item.done ? 'var(--text-muted)' : '#f8fafc', fontSize: '0.85rem' } })
                                        ),
                                        papyr.button({
                                            style: { background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: '12px' },
                                            onclick: () => handleDeleteTodo(item.id)
                                        }, "✕")
                                    )
                                )
                            )
                        ),

                        // Legacy integration Showcase
                        papyr.div('.control-group',
                            papyr.div({ style: { borderTop: '1px dashed rgba(255,255,255,0.08)', paddingTop: '16px' } },
                                papyr.span('.legacy-badge', "🔧 Legacy Renovations"),
                                papyr.label('.control-label', "Vanilla JS Interop Showcase"),
                                papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.8rem', marginTop: '4px', marginBottom: '12px' } },
                                    "Upgrade legacy vanilla inputs reactively using papyr.bind and papyr.watch in-place without rewrite."
                                ),
                                papyr.div('.legacy-box',
                                    papyr.label({ style: { display: 'block', fontSize: '0.75rem', color: '#fca5a5', marginBottom: '6px', fontWeight: 'bold' } }, "Legacy DOM Input (Non-Papyr):"),
                                    papyr.input({
                                        id: 'legacy-input',
                                        class: 'legacy-input',
                                        value: 'Vanilla JS legacy value'
                                    }),
                                    papyr.div({ style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '4px' } },
                                        papyr.span({ style: { fontSize: '0.75rem', color: 'var(--text-muted)' } }, "Reactive Output:"),
                                        papyr.span({
                                            id: 'legacy-display',
                                            style: { fontSize: '0.85rem', color: '#fca5a5', fontWeight: 'bold', fontFamily: 'monospace' }
                                        }, "Vanilla JS legacy value")
                                    )
                                )
                            )
                        )
                    ),

                    // Right Column: Canvas engines & ML Classifiers
                    papyr.main({ style: { display: 'flex', flexDirection: 'column', gap: '32px' } },
                        
                        // Charts Grid using Papyr's layout grid builder reactively
                        papyr.layout.grid({ 
                            cols: papyr.computed(() => windowWidthVal.value < 1200 ? '1fr' : '1fr 1fr'), 
                            gap: '24px' 
                        },
                            
                            // STEM Graph
                            papyr.section('.glass-panel', { style: { display: 'flex', flexDirection: 'column' } },
                                papyr.span('.badge', { style: { background: 'rgba(16,185,129,0.1)', borderColor: 'rgba(16,185,129,0.3)', color: '#34d399' } }, "STEM Grapher"),
                                papyr.h3({ style: { margin: '0 0 12px 0' } }, "Live Equation Plotter"),
                                papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.85rem', margin: '0 0 16px 0' } }, 
                                    "Direct canvas plotting of y = Math.sin(x * freq) reactively."
                                ),
                                // Canvas mount target
                                papyr.div('#science-plotter-container', { style: { flex: '1', minHeight: '200px' } })
                            ),

                            // Dynamic Chart
                            papyr.section('.glass-panel', { style: { display: 'flex', flexDirection: 'column' } },
                                papyr.span('.badge', "Visual Charts"),

                        // Physics Simulation
                        papyr.section('.glass-panel',
                            papyr.span('.badge', { style: { background: 'rgba(244,63,94,0.1)', borderColor: 'rgba(244,63,94,0.3)', color: '#fb7185' } }, "2D Verlet Physics"),
                            papyr.h3({ style: { margin: '0 0 4px 0' } }, "Rigid Multibody World"),
                            papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.85rem', margin: '0 0 16px 0' } },

                            ),

                        ),

                        // ML classifier Perceptron board
                        papyr.section('.glass-panel',
                            papyr.span('.badge', { style: { background: 'rgba(168,85,247,0.1)', borderColor: 'rgba(168,85,247,0.3)', color: '#c084fc' } }, "Statistical ML Perceptron"),
                            papyr.h3({ style: { margin: '0 0 4px 0' } }, "Interactive Perceptron Trainer"),
                            papyr.p({ style: { color: 'var(--text-muted)', fontSize: '0.85rem', margin: '0 0 16px 0' } }, 
                                "Click inside the training board to plot nodes. Red dots target -1, Indigo targets 1. Trains linear boundaries instantly."
                            ),

                            papyr.div({ style: { display: 'flex', gap: '24px', flexWrap: 'wrap' } },
                                
                                // Interactive training board canvas
                                papyr.div({ style: { position: 'relative' } },
                                    papyr.canvas({

                                        style: {

                                    papyr.span({ style: { position: 'absolute', bottom: '8px', left: '12px', fontSize: '0.75rem', color: 'var(--text-muted)' } }, "X1 (Width)"),
                                    papyr.span({ style: { position: 'absolute', top: '12px', right: '12px', fontSize: '0.75rem', color: 'var(--text-muted)' } }, "X2 (Height)")
                                ),

                                papyr.div({ style: { flex: '1', minWidth: '250px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' } },

                            ),

`// Instantiated entirely in JS:
const App = papyr.div('.container',
    papyr.header('.header-section',
        papyr.h1("Live Developer Studio"),
        papyr.p("Zero Virtual DOM templates")
    ),
    papyr.layout.grid({ cols: 'repeat(auto-fit, minmax(380px, 1fr))', gap: '32px' },
        papyr.aside('.glass-panel',
            // Task Manager CRUD bindings
            papyr.input('text', { ...papyr.model(todoInputVal) }),
            papyr.button('+', { onclick: handleAddTodo })
        )
    )
);

papyr.mount('#app', App);`
                            )

                )

            );

            // ==========================================
            // 6. MOUNT THE ENTIRE APPLICATIONS TREE
            // ==========================================
            papyr.mount('#app', App);

            // ==========================================
            // 7. INITIALIZE ENGINE INSTANCES AFTER MOUNT
            // ==========================================

            // Re-render science graph upon frequency state changes
            const scienceContainer = document.getElementById('science-plotter-container');
            const dynamicGraph = papyr.science.graph({
                equation: (x) => Math.sin(x * (waveFrequencyVal.value / 3)),
                range: [-8, 8, -2, 2],
                color: '#10b981'
            });
            scienceContainer.appendChild(dynamicGraph);

            waveFrequencyVal.subscribe((newFreq) => {
                const canvas = dynamicGraph.querySelector('canvas');
                if (canvas && papyr.science.graph) {
                    papyr.science.graph(canvas, {
                        equation: (x) => Math.sin(x * (newFreq / 3)),
                        range: [-8, 8, -2, 2],
                        color: '#10b981'
                    });
                }
            });

            // Mount Unified bar chart
            const chartContainer = document.getElementById('chart-container');
            const dynamicChart = papyr.chart({
                type: 'bar',
                data: papyr.computed(() => [
                    { label: 'A', value: chartDataVal.value },
                    { label: 'B', value: Math.abs(100 - chartDataVal.value) },
                    { label: 'C', value: Math.round(chartDataVal.value * 0.7) },
                    { label: 'D', value: Math.round(chartDataVal.value * 1.3) }
                ]),
                colors: ['#6366f1', '#14b8a6', '#f43f5e', '#a855f7']
            });
            chartContainer.appendChild(dynamicChart);

            // Mount 2D Verlet physics simulator
            const physicsContainer = document.getElementById('physics-sandbox');
            const physicalWorld = papyr.physics.world({ gravity: 0.6, friction: 0.98 });
            physicsContainer.appendChild(physicalWorld);

            // Initialize Perceptron board
            const mlCanvas = document.getElementById('ml-canvas');
            const mlCtx = mlCanvas.getContext('2d');

            const drawMLBoard = () => {
                mlCtx.clearRect(0, 0, mlCanvas.width, mlCanvas.height);
                
                // Draw grid coordinate lines
                mlCtx.strokeStyle = 'rgba(255,255,255,0.03)';
                mlCtx.lineWidth = 1;
                for (let i = 50; i < mlCanvas.width; i += 50) {
                     mlCtx.beginPath();
                     mlCtx.moveTo(i, 0); mlCtx.lineTo(i, mlCanvas.height);
                     mlCtx.moveTo(0, i); mlCtx.lineTo(mlCanvas.width, i);
                     mlCtx.stroke();
                }

                // Draw linear decision boundary
                const w = perceptron.weights;
                const b = perceptron.bias;
                if (Math.abs(w[1]) > 0.001) {
                    mlCtx.strokeStyle = 'rgba(168, 85, 247, 0.4)';
                    mlCtx.lineWidth = 2;
                    mlCtx.beginPath();
                    const x1 = -1;
                    const y1 = (-w[0] * x1 - b) / w[1];
                    const x2 = 1;
                    const y2 = (-w[0] * x2 - b) / w[1];

                    const screenX1 = (x1 + 1) * 150;
                    const screenY1 = (1 - y1) * 150;
                    const screenX2 = (x2 + 1) * 150;
                    const screenY2 = (1 - y2) * 150;

                    mlCtx.moveTo(screenX1, screenY1);
                    mlCtx.lineTo(screenX2, screenY2);
                    mlCtx.stroke();
                }

                // Draw custom clicked training nodes
                trainingPoints.forEach(p => {
                    mlCtx.fillStyle = p.label === 1 ? '#6366f1' : '#f43f5e';
                    mlCtx.beginPath();
                    mlCtx.arc(p.screenX, p.screenY, 7, 0, Math.PI * 2);
                    mlCtx.fill();
                    
                    mlCtx.strokeStyle = '#000';
                    mlCtx.lineWidth = 1.5;
                    mlCtx.stroke();
                });
            };

            // Event listener: Plotting points on coordinate canvas click
            mlCanvas.addEventListener('mousedown', (e) => {
                const rect = mlCanvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;

                const x1 = (screenX / 150) - 1;
                const x2 = 1 - (screenY / 150);

                const label = e.button === 0 ? (trainingPoints.length % 2 === 0 ? 1 : -1) : 1;

                trainingPoints.push({ screenX, screenY, x1, x2, label });
                perceptronCount.value = trainingPoints.length;

                drawMLBoard();
            });

            // Prevent context menus on right click
            mlCanvas.addEventListener('contextmenu', e => e.preventDefault());

            // Bind training actions
            document.getElementById('btn-ml-train').addEventListener('click', () => {
                if (trainingPoints.length === 0) {
                    alert("Please click inside the black coordinate box first to add training points!");
                    return;
                }

                for (let epoch = 0; epoch < 50; epoch++) {
                    trainingPoints.forEach(p => {
                        perceptron.train([p.x1, p.x2], p.label);
                    });
                }

                perceptronWeights.value = `[${perceptron.weights[0].toFixed(3)}, ${perceptron.weights[1].toFixed(3)}]`;
                perceptronBias.value = perceptron.bias.toFixed(3);
                
                drawMLBoard();
            });

            // Clear ML training board
            document.getElementById('btn-ml-clear').addEventListener('click', () => {
                trainingPoints.length = 0;
                perceptronCount.value = 0;
                perceptron.weights = [Math.random() * 2 - 1, Math.random() * 2 - 1];
                perceptron.bias = Math.random() * 2 - 1;
                perceptronWeights.value = "[0, 0]";
                perceptronBias.value = "0";
                drawMLBoard();
            });

            // Initialize Creative 3D Studio Scene
            const studio3DContainer = document.getElementById('studio-3d-container');
            if (studio3DContainer) {
                const studioScene = papyr['3d'].scene({
                    environment: 'cyberpunk',
                    particles: false,
                    depth: true,
                    gravityActive: gravityActiveVal,
                    objects: [
                        papyr['3d'].cube({
                            size: cubeSizeVal,
                            color: '#6366f1',
                            position: [-1.5, 0, 0],
                            spin: [0.01, 0.02, 0.01]
                        }),
                        papyr['3d'].sphere({
                            radius: sphereRadiusVal,
                            color: '#f43f5e',
                            position: [1.5, 0, 0],
                            spin: [0.01, 0.01, 0.02]
                        }),
                        papyr['3d'].torus({
                            radius: 0.6,
                            tube: 0.15,
                            color: torusColorVal,
                            position: [0, 0, 0.5],
                            spin: [
                                () => torusSpinVal.value * 0.5,
                                () => torusSpinVal.value,
                                () => torusSpinVal.value * 0.7
                            ]
                        })
                    ]
                });
                studio3DContainer.appendChild(studioScene);
            }

            // Bind legacy vanilla HTML elements reactively
            const legacyInput = document.getElementById('legacy-input');
            const legacyDisplay = document.getElementById('legacy-display');
            if (legacyInput) {
                papyr.bind(legacyInput, legacyInputVal);
            }
            if (legacyDisplay) {
                papyr.watch(legacyInputVal, (val) => {
                    legacyDisplay.textContent = val;
                });
            }

            drawMLBoard(); // initial render
        });
    </script>
