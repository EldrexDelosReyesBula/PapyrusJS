    <style>
        :root {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ── Papyrus Native HSL Color Tokens ───────────────── */
        :root.light-mode {
            --app-bg: #f8fafc;
            --app-secondary: #ffffff;
            --app-border: #e2e8f0;
            --app-text: #0f172a;
            --app-text-muted: #64748b;
            --app-accent: #6366f1;
            --app-accent-hover: #4f46e5;
            --app-card-bg: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.06);
            --sidebar-active-bg: rgba(99, 102, 241, 0.06);
        }

        :root.dark-mode {
            --app-bg: #030712;
            --app-secondary: rgba(255, 255, 255, 0.015);
            --app-border: rgba(255, 255, 255, 0.06);
            --app-text: #f9fafb;
            --app-text-muted: #9ca3af;
            --app-accent: #6366f1;
            --app-accent-hover: #4f46e5;
            --app-card-bg: rgba(255, 255, 255, 0.015);
            --glass-bg: rgba(10, 15, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --sidebar-active-bg: rgba(99, 102, 241, 0.08);
        }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--app-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--app-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--app-accent);
        }

        /* ── Papyr Shell Theme Sync ─────────────────────── */
        .papyr-app-shell {
            background: var(--app-bg) !important;
            color: var(--app-text) !important;
        }

        .papyr-shell-header {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border) !important;
            color: var(--app-text) !important;
        }

        .papyr-shell-header .menu-toggle {
            color: var(--app-text) !important;
            background: transparent !important;
            border: 1px solid var(--app-border) !important;
            border-radius: 8px !important;
        }

        .papyr-shell-sidebar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border) !important;
            color: var(--app-text) !important;
        }

        .papyr-main-content {
            background: var(--app-bg) !important;
            color: var(--app-text) !important;
        }

        .papyr-shell-footer {
            background: var(--app-secondary) !important;
            border-top: 1px solid var(--app-border) !important;
            color: var(--app-text) !important;
            position: static !important;
            flex-shrink: 0 !important;
            z-index: auto !important;
        }

        /* ── Markdown Content Typography ────────────────── */
        .markdown-content h1 {
            font-size: 32px;
            margin: 20px 0;
            font-weight: 700;
            border-bottom: 2px solid var(--app-border);
            padding-bottom: 12px;
            color: var(--app-text);
        }

        .markdown-content h2 {
            font-size: 24px;
            margin: 20px 0;
            font-weight: 600;
            border-bottom: 1px solid var(--app-border);
            padding-bottom: 8px;
        }

        .markdown-content h3 {
            font-size: 18px;
            margin: 15px 0;
            font-weight: 600;
        }

        .markdown-content h4 {
            font-size: 15px;
            margin: 12px 0;
            font-weight: 600;
        }

        .markdown-content p {
            margin: 10px 0;
            line-height: 1.8;
        }

        .markdown-content code {
            background: rgba(99, 102, 241, 0.09);
            padding: 3px 7px;
            border-radius: 6px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.88em;
            color: var(--app-accent);
        }

        .markdown-content pre {
            background: var(--app-secondary);
            border: 1px solid var(--app-border);
            padding: 16px;
            margin: 18px 0;
            overflow-x: auto;
            border-radius: 10px;
            position: relative;
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: 13px;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-left: 20px;
            margin-bottom: 10px;
            line-height: 1.8;
        }

        .markdown-content li {
            margin: 4px 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--app-accent);
            margin: 16px 0;
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.04);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .markdown-content a {
            color: var(--app-accent);
            text-decoration: none;
            font-weight: 500;
        }

        .markdown-content a:hover {
            text-decoration: underline;
            color: var(--app-accent-hover);
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 18px 0;
            font-size: 14px;
        }

        .markdown-content th,
        .markdown-content td {
            padding: 10px 14px;
            border: 1px solid var(--app-border);
            text-align: left;
        }

        .markdown-content th {
            background: var(--app-secondary);
            font-weight: 600;
        }

        .markdown-content tr:nth-child(even) td {
            background: rgba(0, 0, 0, 0.015);
        }

        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 12px 0;
            display: block;
        }

        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--app-border);
            margin: 24px 0;
        }

        /* ── Playground Layout ───────────────────────────── */
        .playground-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 150px);
            min-height: 450px;
        }

        /* ── Responsive Styling (< 768px Tablet & Mobile) ─ */
        @media (max-width: 768px) {
            .papyr-app-shell {
                grid-template-columns: 1fr !important;
            }

            .papyr-shell-sidebar {
                position: fixed !important;
                top: 60px !important;
                left: 0 !important;
                bottom: 0 !important;
                height: calc(100vh - 60px) !important;
                z-index: 1000 !important;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.45) !important;
                border-right: 1px solid var(--app-border) !important;
            }

            .papyr-main-content {
                grid-column: 1 / -1 !important;
                width: 100% !important;
                margin-left: 0 !important;
                padding: 16px !important;
            }

            .papyr-shell-footer {
                grid-column: 1 / -1 !important;
                position: static !important;
                flex-direction: column !important;
                gap: 8px !important;
                padding: 12px 16px !important;
                text-align: center !important;
            }

            .playground-container {
                grid-template-columns: 1fr !important;
                height: auto !important;
                gap: 16px !important;
            }

            .playground-container > div {
                height: 380px !important;
            }

            .markdown-content h1 { font-size: 24px !important; }
            .markdown-content h2 { font-size: 20px !important; }
            .markdown-content h3 { font-size: 16px !important; }
            .markdown-content pre { font-size: 12px !important; padding: 12px !important; }
            .markdown-content code { font-size: 0.82em !important; }
            .papyr-shell-header { padding: 0 16px !important; }
        }

        /* ── Responsive Tiny Displays (< 480px Mobile) ───── */
        @media (max-width: 480px) {
            .playground-container > div {
                height: 320px !important;
            }

            .markdown-content h1 { font-size: 20px !important; }
            .markdown-content h2 { font-size: 18px !important; }
            .markdown-content ul, .markdown-content ol { margin-left: 14px !important; }
            .markdown-content table { font-size: 12px !important; }
            .markdown-content th, .markdown-content td { padding: 8px 10px !important; }
        }
    </style>
</head>

<body>

    <script>
        // ── Markdown renderer ──────────────────────────────────
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                highlight: (code, lang) => {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, {
                                language: lang
                            }).value;
                        } catch (e) {
                            console.warn('Highlight error:', e);
                        }
                    }
                    return hljs.highlightAuto(code).value;
                }
            });
        }

        // ── Theme ──────────────────────────────────────────────
        let isDarkMode;
        try {
            const savedTheme = localStorage.getItem('papyr-theme');
            isDarkMode = papyr.state(savedTheme === null ? true : savedTheme !== 'light');
        } catch (e) {
            isDarkMode = papyr.state(true);
        }

        function applyTheme() {
            document.documentElement.classList.toggle('dark-mode', isDarkMode.value);
            document.documentElement.classList.toggle('light-mode', !isDarkMode.value);
        }
        applyTheme();

        function toggleTheme() {
            isDarkMode.value = !isDarkMode.value;
            try {
                localStorage.setItem('papyr-theme', isDarkMode.value ? 'dark' : 'light');
            } catch (e) {
                console.warn('Cannot save theme preference');
            }
            applyTheme();
        }

        // ── Docs Catalog ───────────────────────────────────────
        const GH_RAW = 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/';

        // ── Playground Presets Catalog ──────────────────────────
        const PLAYGROUND_PRESETS = {
            counter: {
                name: "🔢 Interactive Counter",
                code: `// 1. Initial State
let count = papyr.state(0);

// 2. Render Component
let app = papyr.div({ style: { padding: '40px', textAlign: 'center' } },
  papyr.h1('Reactive Counter'),
  papyr.p(() => \`Count is: \${count.value}\`),
  papyr.button('Increment', {
    onclick: () => count.value++,
    style: {
      padding: '10px 20px', borderRadius: '8px', cursor: 'pointer',

);

papyr.mount('#preview', app);`
            },
            persistence: {
                name: "💾 State Continuity (localStorage)",
                code: `// 1. State persists across browser page reloads automatically
let clicks = papyr.state(0, { persist: true, key: "demo_clicks" });

// 2. Render Layout
let app = papyr.div({ style: { padding: '40px', textAlign: 'center' } },
  papyr.h2('Isomorphic State Continuity'),
  papyr.p('Refresh this preview or parent page to test persistence!'),
  papyr.h3(() => \`Clicks count: \${clicks.value}\`),
  papyr.button('Click Me', {
    onclick: () => clicks.value++,
    style: {

    }
  })
);

papyr.mount('#preview', app);`
            },
            science: {
                name: "📊 Science Plotter",
                code: `// 1. Initial State for equation & math inputs
let formula = papyr.state("Math.sin(x)");
let canvasRef = papyr.canvas({ id: "graph-canvas", width: 340, height: 140 });

const updateGraph = () => {
  if (!canvasRef) return;
  try {
    papyr.science.graph(canvasRef, formula.value, { color: '#f59e0b', scale: 20 });
  } catch(e) {
    console.error(e);
  }
};

// Watch equation modifications
papyr.watch(formula, updateGraph);

let app = papyr.div({ style: { padding: '20px', textAlign: 'center' } },
  papyr.h3('Science & Math Plotter'),
  papyr.select({
    style: { padding: '8px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', color: '#fff', borderRadius: '6px', marginBottom: '15px' },
    onchange: (e) => { formula.value = e.target.value; }
  },
    papyr.option("Sine Wave: Math.sin(x)", { value: "Math.sin(x)" }),
    papyr.option("Cosine Wave: Math.cos(x)", { value: "Math.cos(x)" }),
    papyr.option("Quadratic Curve: x * x / 10", { value: "x * x / 10" })
  ),
  papyr.div({
    style: { background: '#020617', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '10px', padding: '10px', display: 'flex', justifyContent: 'center' },
    onMounted: () => setTimeout(updateGraph, 50)
  }, canvasRef)
);

papyr.mount('#preview', app);`

const db = papyr.db("demo_users", "local");
let searchQuery = papyr.state("");

const addRandomUser = async () => {
  const names = ["Alice B.", "Bob K.", "Charlie P.", "Diana M."];
  const roles = ["Architect", "Developer", "Designer", "Scrum Master"];
  const name = names[Math.floor(Math.random() * names.length)];
  const role = roles[Math.floor(Math.random() * roles.length)];
  await db.insertAsync({ name, role });

        async function loadDocument(pageName) {
            const page = DOCS[pageName];
            if (!page) return;

            currentPage.value = pageName;

            // Close sidebar on mobile after clicking a link
            if (typeof window !== 'undefined' && window.innerWidth < 768) {
                const sidebarEl = document.querySelector('.papyr-shell-sidebar');
                const toggleBtn = document.querySelector('.menu-toggle');
                if (sidebarEl && toggleBtn && sidebarEl.clientWidth > 50) {
                    toggleBtn.click();
                }
            }

            if (page.type === 'external-demo') {
                return; // Loaded dynamically inside createContent()
            }

            if (page.type === 'doc') {
                // Check if we have pre-rendered SSR HTML content locally
                if (window.PRE_RENDERED_DOCS && window.PRE_RENDERED_DOCS[pageName] !== undefined) {
                    markdownContent.value = window.PRE_RENDERED_DOCS[pageName];
                    isLoading.value = false;
                    setTimeout(() => {
                        document.querySelectorAll('.markdown-content pre code').forEach(el => hljs.highlightElement(el));
                    }, 0);
                    return;
                }

                isLoading.value = true;
                markdownContent.value = '';

                try {
                    const res = await fetch(page.url, {
                        headers: {
                            'Accept': 'text/markdown, text/plain, */*'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);

                    const text = await res.text();
                    if (typeof marked !== 'undefined') {
                        markdownContent.value = marked.parse(text);
                    } else {
                        markdownContent.value = `<pre>${text}</pre>`;
                    }
                    setTimeout(() => {
                        document.querySelectorAll('.markdown-content pre code').forEach(el => hljs.highlightElement(el));
                    }, 0);
                } catch (err) {
                    markdownContent.value =
                        `<div style="background:var(--app-secondary);border:1px solid var(--app-border);
                         border-left:4px solid #ef4444;border-radius:8px;padding:16px;color:var(--app-text)">
                         <strong style="color:#ef4444"><i class="fas fa-exclamation-circle"></i> Error loading document</strong>
                         <p style="margin:8px 0 0;color:var(--app-text-muted)">${err.message}</p>
                         <p style="margin:4px 0 0;font-size:12px;color:var(--app-text-muted)">URL: ${page.url}</p></div>`;

                                src: pageData.url,
                                style: {
                                    width: '100%',
                                    height: '100%',
                                    border: 'none',
                                    borderRadius: '12px'
                                }
                            })
                        );
                    }

                    if (isLoading.value) {
                        return papyr.div({
                            style: {
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                padding: '100px 20px',
                                color: 'var(--app-text-muted)',
                                gap: '10px',
                                fontSize: '15px'
                            }
                        },
                            papyr.i({
                                className: 'fas fa-spinner fa-spin',
                                style: {
                                    color: 'var(--app-accent)',
                                    fontSize: '18px'
                                }
                            }),
                            'Loading documentation…'
                        );
                    }

                    const content = markdownContent.value ||
                        '<p style="color:var(--app-text-muted);padding:40px 0;text-align:center">Select a topic from the sidebar to get started.</p>';

                    return papyr.div({
                        style: {
                            maxWidth: '860px',
                            margin: '0 auto',
                            padding: '16px 20px 60px'
                        }
                    },
                        papyr.div({
                            style: {
                                color: 'var(--app-text)',
                                lineHeight: '1.8'
                            },
                            className: 'markdown-content',
                            innerHTML: content
                        })
                    );
                }
            );
        }

        // ── Footer ─────────────────────────────────────────────
        function createFooter() {
            return papyr.div({
                style: {
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    gap: '16px',
                    flexWrap: 'wrap',
                    padding: '0 20px'
                }
            },
                papyr.span({
                    style: {
                        fontSize: '12px',
                        color: 'var(--app-text-muted)'
                    }
                }, '© 2026 Papyrus.js — Isomorphic Fine-Grained Reactivity'),
                papyr.span({ style: { color: 'var(--app-border)' } }, '·'),
                papyr.a({
                    href: 'https://github.com/EldrexDelosReyesBula/PapyrusJS',
                    target: '_blank',
                    rel: 'noopener noreferrer',
                    style: {
                        fontSize: '12px',
                        color: 'var(--app-accent)',
                        textDecoration: 'none',
                        fontWeight: '600'
                    }
                }, 'GitHub ↗'),
                papyr.span({ style: { color: 'var(--app-border)' } }, '·'),
                papyr.span({
                    style: {
                        fontSize: '12px',
                        color: 'var(--app-text-muted)'
                    }
                }, 'v3.x')
            );
        }

        // ── Bootstrap ──────────────────────────────────────────
        function initApp() {
            // Check if layout.dashboard exists
            if (!papyr.layout || !papyr.layout.dashboard) {
                console.error(
                    'Papyr layout module not loaded. Falling back to basic rendering.');
                papyr.mount('#app', papyr.div({
                    style: {
                        padding: '40px',
                        textAlign: 'center',
                        color: 'var(--app-text)'
                    }
                }, papyr.h1('Papyrus.js Documentation'),
                    papyr.p(
                        'The layout module failed to load. Please check your CDN links and try again.'
                    )));
                return;
            }

            try {
                const shell = papyr.layout.dashboard({
                    sidebarWidth: '290px',
                    headerHeight: '60px',
                    footerHeight: '48px',
                    header: createHeader(),
                    sidebar: createSidebar(),
                    main: createContent(),
                    footer: createFooter()
                });

                papyr.mount('#app', shell);
            } catch (err) {
                console.error('Failed to initialize app:', err);
                document.getElementById('app').innerHTML = `
                    <div style="padding:40px;text-align:center;">
                        <h1>Failed to Initialize</h1>
                        <p>Error: ${err.message}</p>
                    </div>
                `;
            }
        }

        // ── SEO Optimization ────────────────────────────────────
        // Generate sitemap-like structure for search engines
        if (typeof window !== 'undefined') {
            window.DOCS_STRUCTURE = DOCS_STRUCTURE;
            window.DOCS_URLS = Object.values(DOCS_STRUCTURE).flatMap(section =>
                Object.entries(section).filter(([_, data]) => data.url).map(([name, data]) => ({
                    name,
                    url: data.url,
                    type: data.type
                }))
            );
        }

        // ── Backdrop synchronization and Mobile Sidebar Dismissal ─
        function updateBackdrop() {
            setTimeout(() => {
                const sidebarEl = document.querySelector('.papyr-shell-sidebar');
                const backdrop = document.getElementById('sidebar-backdrop');
                if (sidebarEl && backdrop) {
                    const isOpen = sidebarEl.clientWidth > 50;
                    backdrop.style.opacity = isOpen && window.innerWidth < 768 ? '1' : '0';
                    backdrop.style.pointerEvents = isOpen && window.innerWidth < 768 ? 'auto' : 'none';
                }
            }, 50);
        }

        if (typeof window !== 'undefined') {
            window.addEventListener('resize', updateBackdrop);
            document.addEventListener('click', (e) => {
                if (window.innerWidth < 768) {
                    const sidebarEl = document.querySelector('.papyr-shell-sidebar');
                    const toggleBtn = document.querySelector('.menu-toggle');
                    
                    if (sidebarEl && toggleBtn && sidebarEl.clientWidth > 50) {
                        if (!sidebarEl.contains(e.target) && !toggleBtn.contains(e.target)) {
                            toggleBtn.click();
                        }
                    }
                }
                updateBackdrop();
            });
            
            // Also close when backdrop itself is clicked
            document.addEventListener('DOMContentLoaded', () => {
                const backdrop = document.getElementById('sidebar-backdrop');
                if (backdrop) {
                    backdrop.addEventListener('click', () => {
                        const toggleBtn = document.querySelector('.menu-toggle');
                        if (toggleBtn) toggleBtn.click();
                    });
                }
            });
        }

        // ── Start the app ──────────────────────────────────────
        initApp();
        loadDocument('README');
    </script>
</body>

</html>
