    <!-- Merge independent global instances to resolve clobbering conflicts -->
    <script>
        (function () {
            const finalPapyr = window.papyr;
            if (!finalPapyr) {
                console.error('Papyr core failed to load.');
                return;
            }
            const sources = [window.papyrCore, window.papyrAnimate, window.papyrCharts,
            window.papyrDb, window.papyrRouter, window.papyrAi
            ];
            sources.forEach(src => {
                if (!src || src === finalPapyr) return;
                for (let key in src) {
                    if (src.hasOwnProperty(key)) {
                        if (src[key] && typeof src[key] === 'object' && finalPapyr[key] && typeof finalPapyr[
                            key] === 'object') {
                            Object.assign(finalPapyr[key], src[key]);
                        } else if (finalPapyr[key] === undefined) {
                            finalPapyr[key] = src[key];
                        }
                    }
                }
            });
            // Clean up temporary globals
            delete window.papyrCore;
            delete window.papyrAnimate;
            delete window.papyrCharts;
            delete window.papyrDb;
            delete window.papyrRouter;
            delete window.papyrAi;
        })();
    </script>

        if (typeof marked !== 'undefined') {

                    if (lang && hljs.getLanguage(lang)) {
                        try {

                                language: lang
                            }).value;
                        } catch (e) {

                        }
                    }
                    return hljs.highlightAuto(code).value;

        } catch (e) {
            isDarkMode = papyr.state(true);
        }

        function applyTheme() {
            document.documentElement.classList.toggle('dark-mode', isDarkMode.value);
            document.documentElement.classList.toggle('light-mode', !isDarkMode.value);
        }
        applyTheme();

        function toggleTheme() {
            isDarkMode.value = !isDarkMode.value;
            try {
                localStorage.setItem('papyr-theme', isDarkMode.value ? 'dark' : 'light');
            } catch (e) {
                console.warn('Cannot save theme preference');

        // Flat lookup map
        const DOCS = {};
        Object.values(DOCS_STRUCTURE).forEach(section =>
            Object.entries(section).forEach(([name, data]) => {
                DOCS[name] = data;
            })
        );

        // ── Reactive state ─────────────────────────────────────
        let currentPage = papyr.state('README');
        let markdownContent = papyr.state('');
        let isLoading = papyr.state(false);
        let editorCode = papyr.state(
            `let count = papyr.state(0);

        let app = papyr.div(
          { style: { padding: '40px', fontFamily: 'sans-serif', textAlign: 'center' } },
          papyr.h1('Hello Papyr.js! 🚀'),
          papyr.p(() => \`Count: \${count.value}\`),
          papyr.button(
            'Click Me',
            {
              onclick: () => count.value++,
              style: {
                padding: '10px 20px', borderRadius: '6px',
                cursor: 'pointer', border: 'none',
                background: '#818cf8', color: '#fff', fontWeight: '600'
              }
            }
          )
        );

        papyr.mount('#preview', app);`
        );

        // ── Load a document ────────────────────────────────────
        async function loadDocument(pageName) {
            const page = DOCS[pageName];
            if (!page) return;

            currentPage.value = pageName;

            if (page.type === 'external-demo') {
                return; // Loaded dynamically inside createContent()
            }

            if (page.type === 'doc') {
                // Check if we have pre-rendered SSR HTML content locally
                if (window.PRE_RENDERED_DOCS && window.PRE_RENDERED_DOCS[pageName] !== undefined) {
                    markdownContent.value = window.PRE_RENDERED_DOCS[pageName];
                    isLoading.value = false;
                    setTimeout(() => {
                        document.querySelectorAll('.markdown-content pre code').forEach(el => hljs.highlightElement(el));
                    }, 0);
                    return;
                }

                isLoading.value = true;
                markdownContent.value = '';

                try {
                    const res = await fetch(page.url, {
                        headers: {
                            'Accept': 'text/markdown, text/plain, */*'
                        }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);

                    const text = await res.text();
                    if (typeof marked !== 'undefined') {
                        markdownContent.value = marked.parse(text);
                    } else {
                        markdownContent.value = `<pre>${text}</pre>`;
                    }
                    setTimeout(() => {
                        document.querySelectorAll('.markdown-content pre code').forEach(el => hljs.highlightElement(el));
                    }, 0);
                } catch (err) {
                    markdownContent.value =
                        `<div style="background:var(--app-secondary);border:1px solid var(--app-border);
                         border-left:4px solid #ef4444;border-radius:8px;padding:16px;color:var(--app-text)">
                         <strong style="color:#ef4444"><i class="fas fa-exclamation-circle"></i> Error loading document</strong>
                         <p style="margin:8px 0 0;color:var(--app-text-muted)">${err.message}</p>
                         <p style="margin:4px 0 0;font-size:12px;color:var(--app-text-muted)">URL: ${page.url}</p></div>`;
                } finally {
                    isLoading.value = false;
                }
            }
        }

        // ── Run playground code ────────────────────────────────
        function runPlaygroundCode() {
            const preview = document.getElementById('preview-frame');
            if (!preview) return;

            try {
                const doc = preview.contentDocument || preview.contentWindow.document;
                const bgColor = isDarkMode.value ? '#090d16' : '#ffffff';
                const txtColor = isDarkMode.value ? '#f8fafc' : '#0f172a';

                doc.open();
                doc.write('<!DOCTYPE html><html><head>');
                doc.write('<meta charset="UTF-8">');
                doc.write('<script src="https://unpkg.com/@eldrex/papyr@3.0.4/dist/papyr.js"><\/script>');
                doc.write(
                    '<script>window.papyrCore=window.papyr;<\/script>');
                doc.write(
                    '<script src="https://unpkg.com/@eldrex/papyr-animate@3.0.4/dist/papyr-animate.js"><\/script>');
                doc.write(
                    '<script>window.papyrAnimate=window.papyr;<\/script>');
                doc.write(
                    '<script src="https://unpkg.com/@eldrex/papyr-charts@3.0.4/dist/papyr-charts.js"><\/script>');
                doc.write(
                    '<script>window.papyrCharts=window.papyr;<\/script>');
                doc.write(
                    '<script src="https://unpkg.com/@eldrex/papyr-db@3.0.4/dist/papyr-db.js"><\/script>');
                doc.write(
                    '<script>window.papyrDb=window.papyr;<\/script>');
                doc.write(
                    '<script src="https://unpkg.com/@eldrex/papyr-router@3.0.4/dist/papyr-router.js"><\/script>');
                doc.write(
                    '<script>window.papyrRouter=window.papyr;<\/script>');
                doc.write(
                    '<script src="https://unpkg.com/@eldrex/papyr-ai@3.1.1/dist/papyr-ai.js"><\/script>');
                doc.write(
                    '<script>window.papyrAi=window.papyr;<\/script>');
                doc.write(
                    '<script src="https://unpkg.com/@eldrex/papyr-3d@3.1.1/dist/papyr-3d.js"><\/script>');
                doc.write('<script>');
                doc.write(`(function(){
                const f=window.papyr; if(!f) return;
                [window.papyrCore,window.papyrAnimate,window.papyrCharts,window.papyrDb,window.papyrRouter,window.papyrAi]
                .forEach(s=>{if(!s||s===f)return;for(let k in s){if(s.hasOwnProperty(k)){if(s[k]&&typeof s[k]==='object'&&f[k]&&typeof f[k]==='object'){Object.assign(f[k],s[k]);}else if(f[k]===undefined){f[k]=s[k];}}}});
                delete window.papyrCore;delete window.papyrAnimate;delete window.papyrCharts;
                delete window.papyrDb;delete window.papyrRouter;delete window.papyrAi;
            })();`);
                doc.write('<\/script>');
                doc.write(
                    `<style>*{box-sizing:border-box}body{font-family:'Outfit',sans-serif;margin:0;padding:20px;background:${bgColor};color:${txtColor};}<\/style>`
                );
                doc.write(
                    '<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">');
                doc.write('<\/head><body><div id="preview"><\/div>');
                doc.write('<script>');
                doc.write('try {');
                doc.write(editorCode.value);
                doc.write('} catch(e) { document.getElementById("preview").innerHTML = "<div style=\\"color:red;padding:20px;\\"><strong>Error:</strong> " + e.message + "</div>"; }');
                doc.write('<\/script><\/body><\/html>');
                doc.close();
            } catch (err) {
                console.error('Playground execution error:', err);
            }
        }

        // ── Sidebar ────────────────────────────────────────────
        function createSidebar() {

                        alignItems: 'center',
                        gap: '12px',
                        flexShrink: '0'
                    }
                },
                    papyr.div({
                        style: {
                            width: '36px',
                            height: '36px',
                            borderRadius: '8px',
                            flexShrink: '0',
                            background: 'rgba(99,102,241,0.08)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }
                    },
                        papyr.img({
                            src: 'https://eldrex.landecs.org/logo/papyrus-js-logo.png',
                            alt: 'Logo',
                            style: {
                                width: '24px',
                                height: '24px',
                                objectFit: 'contain'
                            }

                    ),
                    papyr.div(
                        papyr.p({

                            }
                        }, 'Papyrus.js'),

                                margin: '2px 0 0'
                            }
                        }, 'Official Documentation')
                    )
                ),

                /* Nav items */
                papyr.div({
                    style: {
                        overflowY: 'auto',
                        flex: '1',
                        padding: '10px 0 20px'
                    }
                },
                    ...Object.entries(DOCS_STRUCTURE).map(([section, docs]) =>
                        papyr.div({
                            style: { marginBottom: '4px' }
                        },
                            // Section header
                            papyr.div({
                                style: {
                                    padding: '10px 20px 4px',
                                    fontSize: '10px',
                                    textTransform: 'uppercase',
                                    fontWeight: '700',
                                    color: 'var(--app-text-muted)',
                                    letterSpacing: '1px'
                                }

                            ...Object.entries(docs).map(([docName, docData]) => {

                                return papyr.div({
                                    style: {
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '10px',
                                        padding: '9px 20px',
                                        cursor: 'pointer',

                                            'var(--app-text-muted)',

                                    },
                                    onclick: () => loadDocument(docName)

                                        className: docData.icon,

                                    papyr.span({
                                        style: {

                                            textOverflow: 'ellipsis',
                                            whiteSpace: 'nowrap'
                                        }
                                    }, docName)
                                );
                            })
                        )
                    )
                )
            );
        }

        // ── Playground ─────────────────────────────────────────
        function createPlayground() {
            const panel = (titleIcon, titleText, ...body) => papyr.div({
                style: {
                    display: 'flex',
                    flexDirection: 'column',
                    background: 'var(--app-secondary)',
                    border: '1px solid var(--app-border)',
                    borderRadius: '12px',
                    overflow: 'hidden'
                }
            },
                papyr.div({
                    style: {
                        padding: '12px 20px',
                        borderBottom: '1px solid var(--app-border)',
                        background: 'var(--app-bg)',
                        fontWeight: '600',
                        fontSize: '13px',
                        color: 'var(--app-text)',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '8px',
                        flexShrink: '0'
                    }
                }, papyr.i({ className: titleIcon }), titleText),
                ...body
            );

            return papyr.div({
                className: 'playground-container'
            },
                // Editor
                panel(
                    'fas fa-edit', ' Playground Editor',
                    papyr.div({
                        style: { flex: '1', overflow: 'hidden' }
                    },
                        papyr.textarea({
                            style: {
                                width: '100%',
                                height: '100%',
                                border: 'none',
                                padding: '16px',
                                fontFamily: '"Fira Code", "Courier New", monospace',
                                fontSize: '13px',
                                resize: 'none',
                                background: 'transparent',
                                color: 'var(--app-text)',
                                lineHeight: '1.7',
                                boxSizing: 'border-box',
                                outline: 'none'
                            },
                            ...papyr.model(editorCode)
                        })
                    ),
                    papyr.div({
                        style: {
                            display: 'flex',
                            gap: '10px',
                            padding: '12px 20px',
                            borderTop: '1px solid var(--app-border)',
                            background: 'var(--app-bg)',
                            flexShrink: '0'
                        }
                    },
                        papyr.button({
                            id: 'run-code-btn',
                            style: {
                                padding: '8px 18px',
                                background: 'var(--app-accent)',
                                border: 'none',
                                color: '#fff',
                                borderRadius: '8px',
                                cursor: 'pointer',
                                fontSize: '13px',
                                fontWeight: '600',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '7px',
                                transition: 'all 0.2s ease',
                                boxShadow: '0 4px 14px rgba(99,102,241,0.3)'
                            },
                            onclick: runPlaygroundCode
                        },
                            papyr.i({ className: 'fas fa-play' }),
                            'Run Live Code'
                        )
                    )
                ),
                // Preview
                panel(
                    'fas fa-eye', ' Live Preview',
                    papyr.div({
                        style: {
                            flex: '1',
                            overflow: 'hidden',
                            background: '#fff',
                            position: 'relative'
                        }
                    },
                        papyr.iframe({
                            id: 'preview-frame',
                            style: {
                                width: '100%',
                                height: '100%',
                                border: 'none'

                            onMounted: () => setTimeout(runPlaygroundCode, 100)
                        })
                    )
                )
            );

        // ── Content area ───────────────────────────────────────
        function createContent() {
            return papyr.div({
                style: {
                    background: 'var(--app-bg)',
                    color: 'var(--app-text)',
                    height: '100%',
                    overflow: 'auto'
                }
            },
                () => {
                    const pageData = DOCS[currentPage.value];
                    if (!pageData) {
                        return papyr.div({
                            style: {
                                textAlign: 'center',
                                padding: '80px 20px',
                                color: 'var(--app-text-muted)'
                            }
                        },
                            papyr.i({
                                className: 'fas fa-ghost',
                                style: {
                                    fontSize: '40px',
                                    marginBottom: '12px',
                                    display: 'block'
                                }
                            }),
                            papyr.p('Page not found — please select a topic from the sidebar.')
                        );
                    }

                    if (pageData.type === 'playground') {
                        return createPlayground();
                    }

                    if (pageData.type === 'external-demo') {
                        return papyr.div({
                            style: {
                                width: '100%',
                                height: 'calc(100vh - 120px)',
                                minHeight: '500px',
                                overflow: 'hidden',
                                borderRadius: '12px',
                                border: '1px solid var(--app-border)',
                                background: 'var(--app-bg)'
                            }
                        },
                            papyr.iframe({
                                src: pageData.url,
                                style: {
                                    width: '100%',
                                    height: '100%',
                                    border: 'none',
                                    borderRadius: '12px'
                                }
                            })
                        );
                    }

                    if (isLoading.value) {
                        return papyr.div({
                            style: {
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                padding: '100px 20px',
                                color: 'var(--app-text-muted)',
                                gap: '10px',
                                fontSize: '15px'
                            }
                        },
                            papyr.i({
                                className: 'fas fa-spinner fa-spin',
                                style: {
                                    color: 'var(--app-accent)',
                                    fontSize: '18px'
                                }
                            }),
                            'Loading documentation…'
                        );
                    }

                    const content = markdownContent.value ||
                        '<p style="color:var(--app-text-muted);padding:40px 0;text-align:center">Select a topic from the sidebar to get started.</p>';

                    return papyr.div({
                        style: {
                            maxWidth: '860px',
                            margin: '0 auto',
                            padding: '16px 20px 60px'

                        papyr.div({
                            style: {
                                color: 'var(--app-text)',
                                lineHeight: '1.8'
                            },
                            className: 'markdown-content',
                            innerHTML: content
                        })
                    );
                }
            );
        }

        // ── Footer ─────────────────────────────────────────────
        function createFooter() {
            return papyr.div({

                    display: 'flex',
                    alignItems: 'center',

                    gap: '16px',

                }, '© 2026 Papyrus.js — Isomorphic Fine-Grained Reactivity'),
                papyr.span({ style: { color: 'var(--app-border)' } }, '·'),
                papyr.a({
                    href: 'https://github.com/EldrexDelosReyesBula/PapyrusJS',
                    target: '_blank',
                    rel: 'noopener noreferrer',
                    style: {
                        fontSize: '12px',
                        color: 'var(--app-accent)',
                        textDecoration: 'none',
                        fontWeight: '600'
                    }
                }, 'GitHub ↗'),
                papyr.span({ style: { color: 'var(--app-border)' } }, '·'),
                papyr.span({
                    style: {
                        fontSize: '12px',
                        color: 'var(--app-text-muted)'
                    }
                }, 'v3.x')
            );
        }

        // ── Bootstrap ──────────────────────────────────────────
        function initApp() {
            // Check if layout.dashboard exists
            if (!papyr.layout || !papyr.layout.dashboard) {
                console.error(
                    'Papyr layout module not loaded. Falling back to basic rendering.');
                papyr.mount('#app', papyr.div({
                    style: {
                        padding: '40px',
                        textAlign: 'center',
                        color: 'var(--app-text)'
                    }
                }, papyr.h1('Papyrus.js Documentation'),
                    papyr.p(
                        'The layout module failed to load. Please check your CDN links and try again.'
                    )));
                return;
            }

            try {
                const shell = papyr.layout.dashboard({
                    sidebarWidth: '290px',
                    headerHeight: '60px',
                    footerHeight: '48px',
                    header: createHeader(),
                    sidebar: createSidebar(),
                    main: createContent(),
                    footer: createFooter()
                });

                papyr.mount('#app', shell);
            } catch (err) {
                console.error('Failed to initialize app:', err);
                document.getElementById('app').innerHTML = `
                    <div style="padding:40px;text-align:center;">
                        <h1>Failed to Initialize</h1>
                        <p>Error: ${err.message}</p>
                    </div>
                `;
            }
        }

        // ── SEO Optimization ────────────────────────────────────
        // Generate sitemap-like structure for search engines
        if (typeof window !== 'undefined') {
            window.DOCS_STRUCTURE = DOCS_STRUCTURE;
            window.DOCS_URLS = Object.values(DOCS_STRUCTURE).flatMap(section =>
                Object.entries(section).filter(([_, data]) => data.url).map(([name, data]) => ({
                    name,
                    url: data.url,
                    type: data.type
                }))
            );
        }

        // ── Start the app ──────────────────────────────────────
        initApp();
        loadDocument('README');
    </script>
