<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papyrus.js - Official Documentation</title>
    <script src="https://papyrus-js.vercel.app/papyr-complete.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #eeeeee;
            --text-primary: #000000;
            --text-secondary: #333333;
            --text-tertiary: #666666;
            --border-color: #e0e0e0;
            --sidebar-bg: #f8f8f8;
            --sidebar-hover: #e8e8e8;
            --accent-color: #000000;
            --accent-light: #333333;
            --link-color: #0066cc;
        }

        html.dark-mode {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-tertiary: #333333;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-tertiary: #b0b0b0;
            --border-color: #404040;
            --sidebar-bg: #0f0f0f;
            --sidebar-hover: #2a2a2a;
            --accent-color: #ffffff;
            --accent-light: #e0e0e0;
            --link-color: #4da6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .docs-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sidebar-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        .sidebar-header-text h1 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--text-primary);
        }

        .sidebar-header-text p {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-color);
        }

        .doc-section {
            margin-bottom: 0;
        }

        .doc-section-title {
            padding: 12px 20px 8px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-tertiary);
            letter-spacing: 0.7px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-size: 13px;
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background: var(--sidebar-hover);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--bg-tertiary);
            color: var(--accent-color);
            font-weight: 600;
            border-left-color: var(--accent-color);
        }

        .nav-icon {
            width: 16px;
            text-align: center;
            flex-shrink: 0;
            color: var(--text-tertiary);
        }

        .nav-link.active .nav-icon {
            color: var(--accent-color);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: var(--bg-primary);
        }

        .content-wrapper {
            max-width: 950px;
            margin: 0 auto;
        }

        .markdown-content h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
        }

        .markdown-content h2 {
            font-size: 26px;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .markdown-content h3 {
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .markdown-content p {
            margin-bottom: 15px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .markdown-content code {
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            color: var(--link-color);
            border: 1px solid var(--border-color);
        }

        .markdown-content pre {
            background: #2c3e50;
            color: #ecf0f1;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin: 20px 0;
            overflow-x: auto;
            border-radius: 6px;
            line-height: 1.4;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #ecf0f1;
            border: none;
        }

        .markdown-content ul, .markdown-content ol {
            margin-left: 25px;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .markdown-content li {
            margin-bottom: 10px;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 20px 0;
            padding: 15px;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        .markdown-content a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
            font-size: 18px;
        }

        .error {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: #c00;
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Configure marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {
                        return code;
                    }
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // Documentation structure with icons
        const DOCS_STRUCTURE = {
            'Root Documentation': {
                'README': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/README.md', icon: 'fas fa-file' },
                'DOCS (Specification)': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/DOCS.md', icon: 'fas fa-book' },
                'Design Guidelines': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/PAPY-DESIGN.md', icon: 'fas fa-palette' },
                'Translation Guide': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/TRANSLATION_GUIDE.md', icon: 'fas fa-language' },
                'Changelog': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/CHANGELOG.md', icon: 'fas fa-history' },
                'Contributing': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/CONTRIBUTING.md', icon: 'fas fa-code-branch' }
            },
            'Getting Started': {
                'Getting Started Guide': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/getting-started.md', icon: 'fas fa-rocket' },
                'The Papyr Way': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/papyr-way.md', icon: 'fas fa-lightbulb' },
                'Core Concepts': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/core-concepts.md', icon: 'fas fa-cube' },
                'Limitations': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/limitations.md', icon: 'fas fa-exclamation' },
                'FAQ': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/faq.md', icon: 'fas fa-question' }
            },
            'Beginner Track': {
                'What is Papyr': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/beginner/what-is-papyr.md', icon: 'fas fa-info-circle' },
                'Installation': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/beginner/installation.md', icon: 'fas fa-download' },
                'First App': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/beginner/first-app.md', icon: 'fas fa-star' }
            },
            'Intermediate': {
                'State Management': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/intermediate/state.md', icon: 'fas fa-database' },
                'Routing & Pages': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/intermediate/routing.md', icon: 'fas fa-map' },
                'Components & Lifecycle': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/intermediate/components.md', icon: 'fas fa-layer-group' }
            },
            'Advanced': {
                'Architecture': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/advanced/architecture.md', icon: 'fas fa-building' },
                'Plugins': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/advanced/plugins.md', icon: 'fas fa-puzzle-piece' },
                'Registry': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/advanced/registry.md', icon: 'fas fa-list' }
            },
            'API Reference': {
                'State & Reactivity': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/state.md', icon: 'fas fa-waveform-lines' },
                'Computed States': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/computed.md', icon: 'fas fa-calculator' },
                'DOM Builder': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/dom.md', icon: 'fas fa-code' },
                'Routing': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/routing.md', icon: 'fas fa-road' },
                'Math Functions': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/math.md', icon: 'fas fa-plus' },
                'Database': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/db.md', icon: 'fas fa-database' },
                'Storage': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/storage.md', icon: 'fas fa-floppy-disk' },
                'UI Components': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/ui.md', icon: 'fas fa-window-restore' },
                'Security': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/advanced.md', icon: 'fas fa-shield' },
                'Animations': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/animation.md', icon: 'fas fa-film' },
                'Utils': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/api/utils.md', icon: 'fas fa-toolbox' }
            },
            'Guides': {
                'Performance': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/guides/performance.md', icon: 'fas fa-gauge' },
                'Security & WATT': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/guides/security.md', icon: 'fas fa-lock' },
                'Debugging': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/guides/debugging.md', icon: 'fas fa-bug' }
            },
            'Recipes': {
                'Todo App': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/recipes/todo.md', icon: 'fas fa-check-square' },
                'Forms & Validation': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/recipes/form.md', icon: 'fas fa-pencil' },
                'Modals': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/recipes/modal.md', icon: 'fas fa-window-maximize' },
                'CRUD': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/recipes/crud.md', icon: 'fas fa-table' },
                'SPA': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/recipes/spa.md', icon: 'fas fa-globe' },
                'Dashboard': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/recipes/dashboard.md', icon: 'fas fa-chart-bar' }
            },
            'Contributors': {
                'Standards': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/contributors/standards.md', icon: 'fas fa-ruler' },
                'Testing': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/contributors/testing.md', icon: 'fas fa-flask' },
                'Pull Requests': { url: 'https://raw.githubusercontent.com/EldrexDelosReyesBula/PapyrusJS/main/docs/contributors/pull-requests.md', icon: 'fas fa-code-pull-request' }
            }
        };

        // Flatten docs for easy lookup
        const DOCS = {};
        Object.values(DOCS_STRUCTURE).forEach(section => {
            Object.entries(section).forEach(([name, data]) => {
                DOCS[name] = data.url;
            });
        });

        // Create reactive state
        let currentDoc = papyr.state('README');
        let markdownContent = papyr.state('');
        let isLoading = papyr.state(false);
        let isDarkMode = papyr.state(localStorage.getItem('papyr-theme') === 'dark');

        // Theme management
        function toggleTheme() {
            isDarkMode.value = !isDarkMode.value;
            if (isDarkMode.value) {
                document.documentElement.classList.add('dark-mode');
                localStorage.setItem('papyr-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark-mode');
                localStorage.setItem('papyr-theme', 'light');
            }
        }

        // Initialize theme
        if (isDarkMode.value) {
            document.documentElement.classList.add('dark-mode');
        }

        // Fetch and render markdown
        async function loadDocument(docName) {
            const url = DOCS[docName];
            if (!url) return;

            currentDoc.value = docName;
            isLoading.value = true;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const markdown = await response.text();
                const html = marked.parse(markdown);
                markdownContent.value = html;
            } catch (error) {
                markdownContent.value = `<div class="error"><strong>Error loading document:</strong> ${error.message}</div>`;
            } finally {
                isLoading.value = false;
            }
        }

        // Create sidebar using Papyr native code
        function createSidebar() {
            return papyr.div(
                { className: 'sidebar' },
                papyr.div(
                    { className: 'sidebar-header' },
                    papyr.div(
                        { className: 'sidebar-logo' },
                        papyr.img({
                            src: 'https://eldrex.landecs.org/logo/papyrus-js-logo.png',
                            alt: 'Papyrus.js Logo'
                        })
                    ),
                    papyr.div(
                        { className: 'sidebar-header-text' },
                        papyr.h1('Papyrus.js'),
                        papyr.p('Documentation')
                    )
                ),
                ...Object.entries(DOCS_STRUCTURE).map(([section, docs]) =>
                    papyr.div(
                        { className: 'doc-section' },
                        papyr.div({ className: 'doc-section-title' }, section),
                        ...Object.entries(docs).map(([docName, docData]) =>
                            papyr.div(
                                {
                                    className: () => currentDoc.value === docName ? 'nav-link active' : 'nav-link',
                                    onclick: () => loadDocument(docName)
                                },
                                papyr.i({ className: () => `nav-icon ${docData.icon}` }),
                                papyr.span(docName)
                            )
                        )
                    )
                )
            );
        }

        // Create content area using Papyr native code
        function createContent() {
            return papyr.div(
                { className: 'content' },
                papyr.div(
                    { className: 'theme-toggle', onclick: toggleTheme },
                    papyr.i({ 
                        className: () => isDarkMode.value ? 'fas fa-sun' : 'fas fa-moon'
                    }),
                    papyr.span(() => isDarkMode.value ? 'Light' : 'Dark')
                ),
                papyr.div(
                    { className: 'content-wrapper' },
                    () => {
                        if (isLoading.value) {
                            return papyr.div(
                                { className: 'loading' },
                                papyr.i({ className: 'fas fa-spinner fa-spin', style: { marginRight: '10px' } }),
                                papyr.span('Loading...')
                            );
                        }
                        return papyr.div(
                            { 
                                className: 'markdown-content', 
                                innerHTML: markdownContent.value || '<div class="loading">Select a document to view</div>' 
                            }
                        );
                    }
                )
            );
        }

        // Main app using Papyr native code
        const app = papyr.div(
            { className: 'docs-container' },
            createSidebar(),
            createContent()
        );

        // Mount using Papyr native mount
        papyr.mount('#app', app);

        // Load initial document
        loadDocument('README');
    </script>
</body>
</html>
