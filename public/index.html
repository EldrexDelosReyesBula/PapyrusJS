    <script>

            const stored = localStorage.getItem('papyr-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = stored === 'light' ? false : (stored === 'dark' ? true : prefersDark);
            document.documentElement.classList.toggle('dark', isDark);
        })();

                code: `let app = papyr.div({ style: { padding: '20px', textAlign: 'center' } },\n  papyr.h3('WebGL Cinematic Cylinder'),\n  papyr.p({ style: { fontSize: '13px', color: '#94a3b8' } }, 'Automatically scales and rotates based on mouse move!'),\n  papyr.div({\n    style: { width: '100%', height: '220px', borderRadius: '12px', overflow: 'hidden', background: '#05070f' },\n    onMounted: (el) => {\n      if (typeof THREE !== 'undefined') {\n        const scene = papyr['3d'].scene({\n          environment: 'cyberpunk',\n          particles: true,\n          objects: [\n            papyr['3d'].cylinder({\n              radius: 0.8,\n              height: 1.8,\n              color: '#38bdf8',\n              position: [0, 0, 0],\n              spin: [0.01, 0.015, 0.005]\n            })\n          ]\n        });\n        el.appendChild(scene);\n      } else {\n        el.innerHTML = '<div style="padding:50px;color:#ef4444">Three.js library not loaded.</div>';\n      }\n    }\n  })\n);\npapyr.mount('#preview', app);`

        // --- Reactive state ---
        const currentPage = papyr.state('README');
        const markdownContent = papyr.state('');

        const mobileSidebarOpen = papyr.state(false);

        // Dark mode already set by <head> script, sync JS state
        const isDarkMode = papyr.state(document.documentElement.classList.contains('dark'));

        function applyTheme() {
            document.documentElement.classList.toggle('dark', isDarkMode.value);
        }

        function toggleTheme() {
            isDarkMode.value = !isDarkMode.value;
            localStorage.setItem('papyr-theme', isDarkMode.value ? 'dark' : 'light');
            applyTheme();
        }

        // --- Load document (SSR aware) ---
        async function loadDocument(pageName) {
            const page = DOCS[pageName];
            if (!page) return;
            currentPage.value = pageName;

            if (window.innerWidth < 768) {
                mobileSidebarOpen.value = false;
            }

            const contentEl = document.getElementById('main-content');
            if (contentEl) contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

            if (page.type === 'external-demo') return;

            if (page.type === 'doc') {
                // Use pre‑rendered content if available (SSR)
                if (window.PRE_RENDERED_DOCS && window.PRE_RENDERED_DOCS[pageName] !== undefined) {
                    markdownContent.value = window.PRE_RENDERED_DOCS[pageName];
                    isLoading.value = false;
                    setTimeout(() => {
                        document.querySelectorAll('.markdown-content pre code').forEach(el => {
                            if (!el.classList.contains('language-mermaid')) hljs.highlightElement(el);
                        });
                    }, 0);
                    return;
                }

                isLoading.value = true;
                markdownContent.value = '';
                try {
                    const res = await fetch(page.url, { headers: { 'Accept': 'text/markdown, text/plain, */*' } });
                    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
                    const text = await res.text();
                    markdownContent.value = (typeof marked !== 'undefined') ? marked.parse(text) : `<pre>${text}</pre>`;
                    setTimeout(() => {
                        document.querySelectorAll('.markdown-content pre code').forEach(el => {
                            if (!el.classList.contains('language-mermaid')) hljs.highlightElement(el);
                        });
                    }, 0);
                } catch (err) {
                    markdownContent.value =
                        `<div class="bg-surface-container-low border border-outline-variant border-l-4 border-l-error rounded p-4 text-on-surface">
                            <strong class="text-error"><i class="fas fa-exclamation-circle"></i> Error loading document</strong>
                            <p class="mt-2 text-on-surface-variant">${err.message}</p>
                            <p class="mt-1 text-xs text-on-surface-variant">URL: ${page.url}</p></div>`;
                } finally {
                    isLoading.value = false;
                }
            }
        }

        // SEO: dynamic title & meta description

            document.title = `${pageName} — Papyrus.js Documentation`;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', `Explore details about ${pageName} on the official PapyrusJS documentation, guides, and API specifications website.`);
        });

        // --- Playground execution ---
        function runPlaygroundCode() {
            const preview = document.getElementById('preview-frame');
            if (!preview) return;
            try {
                const doc = preview.contentDocument || preview.contentWindow.document;
                const bgColor = isDarkMode.value ? '#0b1326' : '#ffffff';
                const txtColor = isDarkMode.value ? '#dae2fd' : '#0f172a';
                doc.open();
                doc.write('<!DOCTYPE html><html><head>');
                doc.write('<meta charset="UTF-8">');
                doc.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>');
                doc.write('<script src="https://papyrus-js.vercel.app/papyr-complete.js"><\/script>');
                doc.write(`<style>*{box-sizing:border-box}body{font-family:'Inter',sans-serif;margin:0;padding:20px;background:${bgColor};color:${txtColor};}<\/style>`);
                doc.write('</head><body><div id="preview"></div>');
                doc.write('<script>');
                doc.write('try {');
                doc.write(editorCode.value);
                doc.write('} catch(e) { document.getElementById("preview").innerHTML = "<div style=\\"color:red;padding:20px;\\"><strong>Error:</strong> " + e.message + "</div>"; }');
                doc.write('<\/script><\/body><\/html>');
                doc.close();

                console.error('Playground execution error:', err);

        function createContent() {

                    papyr.div({ className: 'flex gap-6' },
                        papyr.a({ href: 'https://www.npmjs.com/package/@eldrex/papyr', className: 'text-on-surface-variant hover:text-primary transition-colors' }, 'NPM'),
                        papyr.a({ href: 'https://github.com/EldrexDelosReyesBula/PapyrusJS', target: '_blank', className: 'text-on-surface-variant hover:text-primary transition-colors' }, 'GitHub')
                    )
                )
            );
        }

        // --- Mount app ---
        function initApp() {
            if (!papyr || !papyr.div) {
                console.error('Papyrus not loaded.');
                return;
            }
            const shell = papyr.div({ className: 'min-h-screen flex flex-col' },
                createHeader(),
                createSidebar(),
                createContent(),
                createFooter()
            );
            papyr.mount('#app', shell);
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) mobileSidebarOpen.value = false;
        });

        initApp();
        loadDocument('README');
    </script>
</body>
</html>
